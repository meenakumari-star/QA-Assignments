version: "3.8"

services:
  api:
    image: node:20-alpine
    container_name: shopeasy-api
    working_dir: /app
    ports:
      - "3000:3000"
    volumes:
      - ./api:/app
    command: sh -c "npm install && node server.js"
    restart: unless-stopped

  swagger-ui:
    image: swaggerapi/swagger-ui
    container_name: shopeasy-swagger
    ports:
      - "8080:8080"
    environment:
      - SWAGGER_JSON=/swagger/openapi.yaml
    volumes:
      - ./swagger:/swagger
    restart: unless-stopped
